<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LGI Electrónics - Gestión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --lgi-gold:    #D4A017;
            --lgi-gold-dk: #a87c10;
            --lgi-black:   #111111;
            --lgi-dark:    #1a1a1a;
            --lgi-border:  #2a2a2a;
            --lgi-muted:   #555555;
            --lgi-text:    #e0e0e0;

            --state-ing:   #c9961a;
            --state-dia:   #60a5fa;
            --state-rep:   #fb923c;
            --state-lst:   #34d399;
            --state-inact: #f87171;
            --state-ent:   #666666;
        }

        body {
            background-color: var(--lgi-black);
            color: var(--lgi-text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            width: 100%;
            padding-right: var(--bs-gutter-x, .75rem);
            padding-left:  var(--bs-gutter-x, .75rem);
        }

        /* ── NAVBAR ── */
        .navbar {
            background-color: var(--lgi-dark) !important;
            border-bottom: 2px solid var(--lgi-gold);
            padding: 0.5rem 1rem;
        }
        .nav-link {
            font-weight: 500;
            color: rgba(255,255,255,0.7) !important;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            border-radius: 8px;
            padding: 8px 15px !important;
        }
        .nav-link:hover {
            color: var(--lgi-gold) !important;
            background: rgba(212,160,23,0.08);
        }
        .nav-btn-ingreso {
            background-color: var(--lgi-gold) !important;
            color: var(--lgi-black) !important;
            font-weight: 700 !important;
        }
        .nav-btn-ingreso:hover {
            background-color: var(--lgi-gold-dk) !important;
            color: var(--lgi-black) !important;
            transform: translateY(-1px);
        }

        /* ── DROPDOWN ── */
        .dropdown-menu {
            background-color: var(--lgi-dark);
            border: 1px solid var(--lgi-border);
        }
        .dropdown-item { color: var(--lgi-text); }
        .dropdown-item:hover {
            background-color: rgba(212,160,23,0.1);
            color: var(--lgi-gold);
        }
        .dropdown-divider { border-color: var(--lgi-border); }
        .dropdown-item-text { color: var(--lgi-muted) !important; }

        /* ── CARDS ── */
        .card {
            background-color: var(--lgi-dark);
            border: 1px solid var(--lgi-border) !important;
            box-shadow: none;
            border-radius: 10px;
        }
        .card-header { border-bottom: 1px solid var(--lgi-border); }

        /* ── FORMULARIOS ── */
        .form-control, .form-select {
            background-color: #222;
            border: 1px solid var(--lgi-border);
            color: var(--lgi-text);
        }
        .form-control:focus, .form-select:focus {
            background-color: #222;
            border-color: var(--lgi-gold);
            color: var(--lgi-text);
            box-shadow: 0 0 0 2px rgba(212,160,23,0.15);
        }
        .form-control::placeholder { color: var(--lgi-muted); }
        .form-label { color: #aaa; font-size: 0.8rem; }

        /* ── TABLAS — override completo de Bootstrap ── */
        .table {
            --bs-table-bg:           transparent;
            --bs-table-striped-bg:   transparent;
            --bs-table-active-bg:    transparent;
            --bs-table-hover-bg:     rgba(212,160,23,0.05);
            --bs-table-hover-color:  var(--lgi-text);
            --bs-table-color:        var(--lgi-text);
            --bs-table-border-color: var(--lgi-border);
            color: var(--lgi-text);
            border-color: var(--lgi-border);
        }
        .table thead {
            background-color: var(--lgi-gold);
            color: var(--lgi-black);
        }
        .table thead th {
            border: none;
            font-weight: 700;
            letter-spacing: 0.5px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .table tbody tr { border-color: var(--lgi-border); }

        /* ── BADGES DE ESTADO GLOBALES ── */
        .badge-ing  { background:#1a1500; color:var(--state-ing);   border:1px solid #3a2e00; }
        .badge-dia  { background:#001428; color:var(--state-dia);   border:1px solid #002244; }
        .badge-rep  { background:#1a0a00; color:var(--state-rep);   border:1px solid #3a1800; }
        .badge-lst  { background:var(--lgi-gold); color:var(--lgi-black); }
        .badge-inact{ background:#1a0000; color:var(--state-inact); border:1px solid #330000; }
        .badge-ent  { background:#1a1a1a; color:var(--state-ent);   border:1px solid #2a2a2a; }

        /* ── BOTONES ── */
        .btn-lgi-gold {
            background-color: var(--lgi-gold);
            color: var(--lgi-black);
            font-weight: 700;
            border: none;
        }
        .btn-lgi-gold:hover {
            background-color: var(--lgi-gold-dk);
            color: var(--lgi-black);
        }
        .btn-outline-light:hover {
            background-color: rgba(212,160,23,0.1);
            border-color: var(--lgi-gold);
            color: var(--lgi-gold) !important;
        }

        /* ── MODAL ── */
        .modal-content {
            background-color: var(--lgi-dark);
            border: 1px solid var(--lgi-border);
        }
        .modal-header, .modal-footer { border-color: var(--lgi-border); }

        /* ── MOBILE ── */
        @media (max-width: 991.98px) {
            .navbar-brand img { height: 50px !important; }
            .navbar-collapse {
                background: var(--lgi-dark);
                padding: 1rem;
                border-radius: 12px;
                margin-top: 10px;
                border: 1px solid var(--lgi-border);
            }
            .nav-item { margin-bottom: 8px; }
            .dropdown { margin-top: 15px; border-top: 1px solid var(--lgi-border); padding-top: 15px; }
            input, select, textarea { font-size: 16px !important; }
            .table-responsive { border: 0; }
            .container.mt-4 {
                padding-left: 10px;
                padding-right: 10px;
                margin-top: 1.5rem !important;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-lg sticky-top">
        <div class="container-fluid container-lg">
            <a class="navbar-brand py-0" href="{% url 'dashboard' %}">
                {% load static %}
                <img src="{% static 'img/logo.png' %}" alt="LGI"
                     style="height: 65px; width: auto; object-fit: contain;">
            </a>

            <button class="navbar-toggler border-0" type="button"
                    data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'dashboard' %}">
                            <i class="bi bi-house-door me-2"></i> Inicio
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-btn-ingreso" href="{% url 'nuevo_ingreso' %}">
                            <i class="bi bi-plus-circle me-2"></i> NUEVO INGRESO
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'inventario' %}">
                            <i class="bi bi-box-seam me-2"></i> Stock
                        </a>
                    </li>
                    {% if user.is_staff %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'reportes' %}">
                            <i class="bi bi-graph-up-arrow me-2"></i> Ganancias
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'gestion_usuarios' %}"
                           style="color: var(--state-dia) !important;">
                            <i class="bi bi-people me-2"></i> Personal
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'papelera_fichas' %}"
                           style="color: var(--state-inact) !important;">
                            <i class="bi bi-trash me-2"></i> Papelera
                        </a>
                    </li>
                    {% endif %}
                </ul>

                <div class="dropdown">
                    <button class="btn btn-outline-light btn-sm dropdown-toggle w-100 w-lg-auto"
                            type="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i> {{ user.username }}
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow">
                        <li><span class="dropdown-item-text small">
                            <i class="bi bi-shield-lock me-1"></i>
                            {% if user.is_staff %}Administrador{% else %}Técnico{% endif %}
                        </span></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form method="post" action="{% url 'logout' %}" id="logout-form-base">
                                {% csrf_token %}
                                <button type="submit"
                                        class="dropdown-item text-danger d-flex align-items-center">
                                    <i class="bi bi-box-arrow-right me-2"></i> Salir
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
