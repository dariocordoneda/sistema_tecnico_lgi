{% extends 'gestion/base.html' %}
{% block content %}
<div class="card shadow">
    <div class="card-header bg-dark text-white d-flex justify-content-between">
        <h5 class="mb-0">Preparar Pedido de Repuestos</h5>
        <small>Seleccioná qué querés incluir en el PDF</small>
    </div>
    <div class="card-body">
        <form method="POST" action="{% url 'pdf_pedidos' %}">
            {% csrf_token %}
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>¿Pedir?</th>
                        <th>Repuesto</th>
                        <th>Stock Actual</th>
                        <th>Cantidad a Pedir</th>
                    </tr>
                </thead>
                <tbody>
                    {% for r in repuestos_bajo_stock %}
                    <tr>
                        <td>
                            <input type="checkbox" name="items_seleccionados" value="{{ r.id }}" class="form-check-input" checked>
                        </td>
                        <td>{{ r.nombre }}</td>
                        <td><span class="badge bg-danger">{{ r.cantidad }}</span></td>
                        <td>
                            <input type="number" name="cantidad_{{ r.id }}" value="{{ r.stock_minimo|add:r.stock_minimo }}" class="form-control form-control-sm" style="width: 80px;">
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <button type="submit" class="btn btn-success w-100">
                <i class="bi bi-file-earmark-pdf"></i> Generar PDF de Pedido Final
            </button>
        </form>
    </div>
</div>
{% endblock %}
