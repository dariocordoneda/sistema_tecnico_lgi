{% extends 'gestion/base.html' %}
{% block content %}
<div class="row justify-content-center mt-2">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header d-flex align-items-center py-3"
                 style="background:var(--lgi-gold);border-radius:9px 9px 0 0;">
                <i class="bi bi-pencil-square me-2" style="color:var(--lgi-black);"></i>
                <h5 class="mb-0 fw-bold" style="color:var(--lgi-black);">
                    Editar Repuesto: {{ repuesto.nombre }}
                </h5>
            </div>
            <form method="POST" class="card-body p-4">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Nombre del Insumo</label>
                    <input type="text" name="nombre" class="form-control"
                           value="{{ repuesto.nombre }}" required>
                </div>

                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label">Stock Actual</label>
                        <input type="number" name="cantidad" class="form-control"
                               value="{{ repuesto.cantidad }}" required>
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label">Alerta Mínimo</label>
                        <input type="number" name="stock_minimo" class="form-control"
                               value="{{ repuesto.stock_minimo }}">
                    </div>
                </div>

                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label">Costo $</label>
                        <input type="number" step="0.01" name="precio_costo" class="form-control"
                               value="{{ repuesto.precio_costo|stringformat:'.2f' }}" required>
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label">Venta Sugerida $</label>
                        <input type="number" step="0.01" name="precio_venta" class="form-control"
                               value="{{ repuesto.precio_venta_sugerido|stringformat:'.2f' }}" required>
                    </div>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a href="{% url 'inventario' %}" class="btn btn-sm"
                       style="background:var(--lgi-dark);border:1px solid var(--lgi-border);color:var(--lgi-muted);">
                        <i class="bi bi-arrow-left me-1"></i> Cancelar
                    </a>
                    <button type="submit" class="btn btn-lgi-gold px-4">
                        <i class="bi bi-check-lg me-1"></i> Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
