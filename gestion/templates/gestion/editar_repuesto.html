{% extends 'gestion/base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-pencil-square"></i> Editar Repuesto: {{ repuesto.nombre }}</h5>
                </div>
                <form method="POST" class="card-body">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Nombre del Insumo</label>
                        <input type="text" name="nombre" class="form-control" value="{{ repuesto.nombre }}" required>
                    </div>
                    
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Stock Actual</label>
                            <input type="number" name="cantidad" class="form-control" value="{{ repuesto.cantidad }}" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Alerta Mínimo</label>
                            <input type="number" name="stock_minimo" class="form-control" value="{{ repuesto.stock_minimo }}">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Costo $</label>
                            <input type="number" step="0.01" name="precio_costo" class="form-control" value="{{ repuesto.precio_costo|stringformat:'.2f' }}" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Venta Sugerida $</label>
                            <input type="number" step="0.01" name="precio_venta" class="form-control" value="{{ repuesto.precio_venta_sugerido|stringformat:'.2f' }}" required>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mt-3">
                        <a href="{% url 'inventario' %}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success px-4">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
