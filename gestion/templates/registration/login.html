<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <title>LGI Electrónics - Acceso</title>
    <style>
        :root {
            --lgi-gold:   #D4A017;
            --lgi-black:  #111111;
            --lgi-dark:   #1a1a1a;
            --lgi-border: #2a2a2a;
            --lgi-muted:  #666666;
            --lgi-text:   #e0e0e0;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--lgi-black);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-wrap {
            width: 100%;
            max-width: 400px;
            padding: 16px;
        }

        /* ── LOGO ── */
        .logo-area {
            text-align: center;
            margin-bottom: 28px;
        }
        .hex-logo {
            width: 64px; height: 64px;
            background: var(--lgi-gold);
            clip-path: polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 900; color: var(--lgi-black);
            letter-spacing: -1px; margin-bottom: 12px;
        }
        .brand-name {
            font-size: 1.3rem; font-weight: 700;
            color: var(--lgi-gold);
            letter-spacing: 3px; text-transform: uppercase;
            line-height: 1;
        }
        .brand-tag {
            font-size: 0.7rem; color: var(--lgi-muted);
            letter-spacing: 2px; text-transform: uppercase;
            margin-top: 4px;
        }

        /* ── CARD ── */
        .login-card {
            background: var(--lgi-dark);
            border: 1px solid var(--lgi-border);
            border-radius: 14px;
            padding: 32px 28px;
        }

        .gold-line {
            height: 2px; background: var(--lgi-gold);
            border-radius: 1px; opacity: 0.3;
            margin-bottom: 24px;
        }

        .card-title {
            font-size: 0.75rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px;
            color: var(--lgi-muted); text-align: center;
            margin-bottom: 24px;
        }

        /* ── FORM ── */
        .field-label {
            font-size: 0.7rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
            color: var(--lgi-muted); margin-bottom: 6px;
            display: block;
        }

        .login-card input[type="text"],
        .login-card input[type="password"] {
            width: 100%;
            background: #222;
            border: 1px solid var(--lgi-border);
            border-radius: 8px;
            color: var(--lgi-text);
            padding: 12px 14px;
            font-size: 16px;
            transition: border-color 0.2s;
            outline: none;
        }
        .login-card input[type="text"]:focus,
        .login-card input[type="password"]:focus {
            border-color: var(--lgi-gold);
            box-shadow: 0 0 0 3px rgba(212,160,23,0.1);
        }
        .login-card input::placeholder { color: #444; }

        .btn-entrar {
            width: 100%;
            background: var(--lgi-gold);
            color: var(--lgi-black);
            border: none;
            border-radius: 8px;
            padding: 13px;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .btn-entrar:hover { background: #a87c10; }
        .btn-entrar:active { transform: scale(0.98); }

        /* ── ERROR ── */
        .error-box {
            background: #1a0000;
            border: 1px solid #3a1a1a;
            border-left: 3px solid #f87171;
            border-radius: 8px;
            padding: 10px 14px;
            color: #f87171;
            font-size: 0.82rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ── FOOTER ── */
        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.72rem;
            color: #333;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="login-wrap">

        <div class="logo-area">
            <div class="hex-logo">LGI</div>
            <div class="brand-name">LGI Electrónics</div>
            <div class="brand-tag">Servicio Técnico Profesional</div>
        </div>

        <div class="login-card">
            <div class="gold-line"></div>
            <div class="card-title">Acceso al Sistema de Gestión</div>

            {% if form.errors %}
            <div class="error-box">
                <i class="bi bi-exclamation-circle"></i>
                Usuario o contraseña incorrectos. Intentá de nuevo.
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div style="margin-bottom:16px;">
                    <label class="field-label">
                        <i class="bi bi-person me-1"></i>Usuario
                    </label>
                    {{ form.username }}
                </div>
                <div style="margin-bottom:24px;">
                    <label class="field-label">
                        <i class="bi bi-lock me-1"></i>Contraseña
                    </label>
                    {{ form.password }}
                </div>
                <button type="submit" class="btn-entrar">
                    <i class="bi bi-box-arrow-in-right me-2"></i>ENTRAR AL SISTEMA
                </button>
            </form>
        </div>

        <div class="login-footer">
            &copy; 2026 LGI Electrónics — Resistencia, Chaco
        </div>

    </div>
</body>
</html>
