<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>LGI Electrónics - Login</title>
    <style>
        :root {
            --primary-tech: #0f172a;
            --accent-blue: #3b82f6;
        }
        body { 
            background-color: var(--primary-tech) !important; 
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        .card { border-radius: 15px; border: none; }
        /* Inputs grandes para que sea fácil tocar en el taller */
        input { 
            border-radius: 8px !important; 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            font-size: 16px !important; /* Evita zoom automático en iOS */
        }
        .btn-primary {
            background-color: var(--accent-blue);
            border: none;
            padding: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body class="d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-8 col-md-6 col-lg-4">
                <div class="card shadow-lg">
                    <div class="card-body p-4 p-md-5 text-center">
                        <h2 class="mb-2">🛠️ LGI</h2>
                        <h5 class="fw-bold mb-4">Gestión Técnica</h5>
                        
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3 text-start">
                                <label class="form-label fw-bold text-muted small">USUARIO</label>
                                {{ form.username }}
                            </div>
                            <div class="mb-4 text-start">
                                <label class="form-label fw-bold text-muted small">CONTRASEÑA</label>
                                {{ form.password }}
                            </div>
                            <button type="submit" class="btn btn-primary w-100 btn-lg shadow">
                                ENTRAR AL SISTEMA
                            </button>
                        </form>
                    </div>
                </div>
                <p class="text-center text-white-50 mt-4 small">
                    &copy; 2026 LGI Electronics
                </p>
            </div>
        </div>
    </div>
</body>
</html>
