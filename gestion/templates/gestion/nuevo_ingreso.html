<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <title>Nuevo Ingreso - SAT</title>
</head>
<body class="bg-light">
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-plus-circle"></i> Recepción de Equipo</h2>
            <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Cancelar</a>
        </div>

        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white">¿Cliente Existente?</div>
                    <div class="card-body">
                        <label class="form-label">Buscar por Nombre o DNI</label>
                        <input type="text" id="buscadorCliente" class="form-control mb-3" placeholder="Escriba para filtrar...">
                        <div class="list-group" id="listaClientes" style="max-height: 300px; overflow-y: auto;">
                            {% for c in clientes %}
                            <a href="?cliente_id={{ c.id }}" class="list-group-item list-group-item-action">
                                <strong>{{ c.nombre_apellido }}</strong><br>
                                <small class="text-muted">DNI: {{ c.dni }}</small>
                            </a>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <form method="POST" enctype="multipart/form-data" class="card shadow-sm">
                    {% csrf_token %}
                    <div class="card-header bg-primary text-white">
                        {% if cliente_sel %} Editando Cliente: {{ cliente_sel.nombre_apellido }} {% else %} Nuevo Cliente {% endif %}
                    </div>
                    <div class="card-body">
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Nombre y Apellido</label>
                                <input type="text" name="nombre_apellido" class="form-control" required value="{{ cliente_sel.nombre_apellido }}" {% if cliente_sel %}readonly{% endif %}>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">DNI</label>
                                <input type="text" name="dni" class="form-control" value="{{ cliente_sel.dni }}" {% if cliente_sel %}readonly{% endif %}>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-primary fw-bold">Teléfono (WhatsApp)</label>
                                <input type="text" name="telefono" class="form-control border-primary" required value="{{ cliente_sel.telefono }}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-primary fw-bold">Email</label>
                                <input type="email" name="email" class="form-control border-primary" value="{{ cliente_sel.email }}">
                            </div>
                        </div>

                        <hr>
                        <h5 class="mb-3 text-secondary">Información del Equipo</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-4">
                                <label class="form-label">Marca y Modelo</label>
                                <input type="text" name="marca_modelo" class="form-control" placeholder="Ej: iPhone 13" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">IMEI / Serie / Identificador</label>
                                <input type="text" name="identificador" class="form-control" placeholder="Nro de serie">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Contraseña / Patrón</label>
                                <input type="text" name="password" class="form-control" placeholder="Si aplica">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Falla Reportada</label>
                            <textarea name="falla_cliente" class="form-control" rows="2" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Observaciones Estéticas (Rayones, golpes...)</label>
                            <textarea name="obs_recepcion" class="form-control" rows="2"></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Subir Fotos de Recepción</label>
                            <input type="file" name="fotos" class="form-control" multiple accept="image/*">
                        </div>

                        <button type="submit" class="btn btn-success btn-lg w-100">
                            <i class="bi bi-check-circle"></i> Finalizar Ingreso
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('buscadorCliente').addEventListener('input', function(e) {
            let filter = e.target.value.toLowerCase();
            let items = document.querySelectorAll('#listaClientes a');
            items.forEach(item => {
                if (item.innerText.toLowerCase().includes(filter)) {
                    item.style.display = "";
                } else {
                    item.style.display = "none";
                }
            });
        });
    </script>
</body>
</html>
