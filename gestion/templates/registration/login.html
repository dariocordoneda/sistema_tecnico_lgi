<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>LGI Electrónics - Login</title>
</head>
<body class="bg-dark d-flex align-items-center" style="height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5 text-center">
                        <h2 class="mb-4">🛠️ LGI</h2>
                        <p class="text-muted">Ingresa tus credenciales</p>
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3 text-start">
                                <label class="form-label">Usuario</label>
                                {{ form.username }}
                            </div>
                            <div class="mb-3 text-start">
                                <label class="form-label">Contraseña</label>
                                {{ form.password }}
                            </div>
                            <button type="submit" class="btn btn-primary w-100 btn-lg">Entrar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <style>
        input { border-radius: 8px !important; width: 100%; padding: 10px; border: 1px solid #ddd; }
    </style>
</body>
</html>
